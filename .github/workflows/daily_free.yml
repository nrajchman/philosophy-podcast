name: Daily philosophy episode (free)

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      episode_number:
        description: "Episode number (blank = next pending)"
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Restore metadata
        uses: actions/cache@v4
        with:
          path: episodes/metadata.json
          key: podcast-metadata-${{ github.run_number }}
          restore-keys: podcast-metadata-

      - name: Generate script only
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          mkdir -p episodes
          ARGS="--dry-run"
          [ -n "${{ github.event.inputs.episode_number }}" ] && ARGS="$ARGS --episode ${{ github.event.inputs.episode_number }}"
          python generate_episode_free.py $ARGS

      - name: Upload script as artifact
        uses: actions/upload-artifact@v4
        with:
          name: episode-script
          path: episodes/*.txt
          retention-days: 7

      - name: Save metadata cache
        if: always()
        uses: actions/cache@v4
        with:
          path: episodes/metadata.json
          key: podcast-metadata-${{ github.run_number }}

      - name: Summary
        run: |
          echo "## Script generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the script from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the .txt file from Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Paste it in [notebooklm.google.com](https://notebooklm.google.com)" >> $GITHUB_STEP_SUMMARY
          echo "3. Generate Audio Overview" >> $GITHUB_STEP_SUMMARY
          echo "4. Download MP3 and upload to [creators.spotify.com](https://creators.spotify.com)" >> $GITHUB_STEP_SUMMARY
