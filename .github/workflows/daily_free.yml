name: Daily philosophy episode (free)

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      episode_number:
        description: "Episode number (blank = next pending)"
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests edge-tts

      - name: Restore metadata
        uses: actions/cache@v4
        with:
          path: episodes/metadata.json
          key: podcast-metadata-${{ github.run_number }}
          restore-keys: podcast-metadata-

      - name: Generate episode
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          mkdir -p episodes
          ARGS=""
          [ -n "${{ github.event.inputs.episode_number }}" ] && ARGS="--episode ${{ github.event.inputs.episode_number }}"
          python generate_episode_free.py $ARGS

      - name: Upload to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete episodes-latest --yes 2>/dev/null || true
          gh release create episodes-latest \
            --title "Latest Episodes" \
            --notes "Auto-generated philosophy podcast episodes" \
            --prerelease
          for f in episodes/ep*.mp3; do
            [ -f "$f" ] && gh release upload episodes-latest "$f"
          done
          [ -f feed.xml ] && gh release upload episodes-latest feed.xml
          echo "✓ Upload complete"
      - name: Publish feed and audio to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # Save files to temp
          cp feed.xml /tmp/feed.xml
          cp -r episodes /tmp/episodes
          
          # Remove to avoid checkout conflict
          rm -rf feed.xml episodes
          
          git fetch origin gh-pages
          git checkout gh-pages
          
          # Restore files
          cp /tmp/feed.xml feed.xml
          mkdir -p episodes
          cp /tmp/episodes/*.mp3 episodes/ 2>/dev/null || true
          
          git add feed.xml episodes/
          git commit -m "Update episodes" --allow-empty
          git push origin gh-pages
          
          git checkout main
      - name: Save metadata cache
        if: always()
        uses: actions/cache@v4
        with:
          path: episodes/metadata.json
          key: podcast-metadata-${{ github.run_number }}
